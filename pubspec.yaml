name: unia
description: "A manual timetable app for lessons, exams, homework, and study planning."

publish_to: 'none'

version: 0.1.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  dynamic_color: ^1.8.1
  flutter_launcher_icons: ^0.14.4
  
  cupertino_icons: ^1.0.8
  simple_animations: ^5.2.0
  home_widget: ^0.9.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  google_generative_ai: ^0.4.7
  custom_refresh_indicator: ^4.0.1
  package_info_plus: ^9.0.1
  flutter_markdown_plus: ^1.0.7
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon_with_bg.png"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#ff751f"
